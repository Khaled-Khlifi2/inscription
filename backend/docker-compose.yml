version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: student_admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: student_portal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U student_admin -d student_portal"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://student_admin:password@db:5432/student_portal
      DATABASE_URL_SYNC: postgresql://student_admin:password@db:5432/student_portal
      SECRET_KEY: changez-moi-en-production
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      SCOLARITE_DEFAULT_EMAIL: scolarite@universite.tn
      SCOLARITE_DEFAULT_PASSWORD: Admin@2024
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
